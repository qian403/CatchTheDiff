services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: catchthediff
      POSTGRES_PASSWORD: catchthediff
      POSTGRES_DB: catchthediff
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catchthediff"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://catchthediff:catchthediff@db:5432/catchthediff
      ALLOWED_ORIGINS: "http://localhost:3000"
      DEBUG: "false"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
